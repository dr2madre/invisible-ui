version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR for the routine dev tooling to cut noise.
      dev-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "build(deps)"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
