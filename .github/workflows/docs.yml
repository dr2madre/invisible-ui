name: Deploy docs

# Builds the Astro + Starlight docs site and publishes it to GitHub Pages on
# every push to main. One-time setup: in the repo settings, set Pages → Build
# and deployment → Source to "GitHub Actions" (this workflow then owns the
# deploy).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turbo builds the dependency graph first (core → svelte → docs).
      - name: Build docs site
        run: pnpm exec turbo run build --filter=@design-system/docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
